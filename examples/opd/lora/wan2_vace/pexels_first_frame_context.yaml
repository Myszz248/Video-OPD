# Environment Configuration
launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"  # Options: no, fp16, bf16

# Data Configuration
data:
  dataset_dir: "/aigc/posttrain/delong/data_preprocess/video_opd/pexels_img_only_lowMotion.csv"
  preprocessing_batch_size: 8
  dataloader_num_workers: 8
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: null
  sampler_type: "auto"  # Options: auto, distributed_k_repeat, group_contiguous
  # Drop samples whose first-frame aspect ratio is too far from the training
  # `resolution` (height, width), so the teacher's first-frame condition is never
  # badly stretched. Set `first_frame_column` to null to disable filtering.
  first_frame_column: "first_frame_path"
  first_frame_aspect_ratio_tolerance: 0.2  # max(ar_image/ar_video, ar_video/ar_image) - 1
  extra_kwargs:
    prompt_column: "caption_short_paragraph"
    negative_prompt_column: null
    image_column: null
    video_column: null
    audio_column: null

# Student Model Configuration
model:
  finetune_type: "lora"  # Options: full, lora
  lora_rank: 64
  lora_alpha: 128
  target_components: "transformer"
  target_modules: "default"
  model_name_or_path: "Wan-AI/Wan2.1-VACE-1.3B-diffusers"
  model_type: "wan2_vace"
  resume_path: null
  resume_type: null

# Frozen Teacher Model Configuration
teacher:
  model_type: "wan2_vace"
  model_name_or_path: "Wan-AI/Wan2.1-VACE-1.3B-diffusers"
  master_weight_dtype: "bfloat16"
  target_components: []
  runtime_components: ["text_encoders", "transformers", "vae"]
  prompt_template: "{prompt}"
  negative_prompt: null
  extra_kwargs:
    conditioning_scale: 1.0

log:
  run_name: null
  project: "Flow-Factory-Video-OPD"
  logging_backend: "tensorboard"  # Options: wandb, swanlab, tensorboard, none
  save_dir: "saves/"
  save_freq: 10
  save_model_only: true

# Training Configuration
train:
  trainer_type: "opd"
  max_epochs: 100
  opd_loss_type: "velocity_mse"  # Options: velocity_mse, x0_mse
  opd_loss_weighting: "flow_opd"  # Options: flow_opd, uniform
  opd_teacher_weight: 1.0
  opd_reward_weight: 0.0
  opd_kl_beta: 0.0
  ref_param_device: "cuda"

  # Student only receives `caption_short_paragraph` as prompt. The teacher
  # receives the same prompt plus the first-frame image from metadata.
  teacher_guidance_scale: 5.0
  teacher_context_keys: ["first_frame_path"]
  teacher_context_dropout: 0.0

  # OPD supervises exactly three fixed states from the student's own denoising trajectory.
  num_train_timesteps: 3
  time_sampling_strategy: "discrete"  # Options: discrete, discrete_with_init, discrete_wo_init
  time_shift: 3.0
  timestep_range: 0.9
  opd_timestep_mode: "trajectory"  # Options: trajectory, forward_process
  store_student_trajectory: true
  # Store and supervise only these fixed non-final denoising steps from the full
  # 24-step student rollout. They are the only student trajectory states kept.
  opd_trajectory_indices: [4, 12, 20]
  # Additionally, run the teacher for one denoising step from prompt + first-frame
  # context, then blend that latent with each stored student state before teacher
  # supervision.
  opd_blend_teacher_student_latents: true  # Options: true, false
  opd_teacher_blend_weight: 0.5
  opd_student_blend_weight: 0.5

  # Student rollout settings
  resolution: [480, 832]
  extra_kwargs:
    num_frames: 41 # (num_frames - 1) must be divisible by 4
    control_hidden_states_scale: 1.0
  num_inference_steps: 24
  guidance_scale: 5.0

  # Pure OPD distillation does not need repeated rollouts per prompt.
  per_device_batch_size: 1
  group_size: 1
  global_std: false
  advantage_aggregation: "gdpo"
  unique_sample_num_per_epoch: 16
  gradient_step_per_epoch: 1
  gradient_accumulation_steps: 1

  # Optimization
  seed: 42
  learning_rate: 5.0e-5
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # EMA and memory
  ema_decay: 0.95
  ema_update_interval: 1
  ema_device: "cuda"
  enable_gradient_checkpointing: true
  offload_samples_to_cpu: true

# Scheduler Configuration
scheduler:
  # Flow-OPD-faithful rollout: stochastic on-policy states, no log-prob needed for OPD loss.
  dynamics_type: "Flow-SDE"  # Options: Flow-SDE, Dance-SDE, CPS, ODE
  noise_level: 0.7
  sde_steps: null
  num_sde_steps: null

# Evaluation settings
eval:
  resolution: [480, 832]
  extra_kwargs:
    num_frames: 41  # (num_frames - 1) must be divisible by 4
    control_hidden_states_scale: 1.0
  per_device_batch_size: 1
  guidance_scale: 5.0
  num_inference_steps: 30
  eval_freq: 0
  seed: 42
